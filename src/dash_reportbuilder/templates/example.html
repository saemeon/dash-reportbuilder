<!-- Example branded HTML <head> contents shipped with dash-reportbuilder.

     Pass this file to HtmlTemplate(template=str(...)) to override the
     default <style> block.  Edit a copy for your own brand. -->
<style>
  :root {
    --brand-primary: #2563eb;
    --brand-accent: #f59e0b;
    --brand-muted: #64748b;
    --brand-bg: #f8fafc;
  }
  body {
    font-family: Calibri, Helvetica, Arial, sans-serif;
    font-size: 11pt;
    line-height: 1.55;
    color: #1f2937;
    max-width: 820px;
    margin: 2.5em auto;
    padding: 0 1.25em;
    background: var(--brand-bg);
  }
  h1 {
    font-size: 2em;
    font-weight: 700;
    color: var(--brand-primary);
    margin: 0.4em 0 0.4em;
    border-bottom: 3px solid var(--brand-primary);
    padding-bottom: 0.2em;
  }
  h2 {
    font-size: 1.35em;
    font-weight: 700;
    color: var(--brand-primary);
    margin: 1.4em 0 0.4em;
  }
  h3 {
    font-size: 1.1em;
    font-weight: 700;
    color: var(--brand-muted);
    margin: 1em 0 0.3em;
  }
  p { margin: 0.6em 0; }
  figure { margin: 1.2em 0; text-align: center; }
  figure img { max-width: 100%; height: auto; border-radius: 4px; }
  figcaption {
    font-size: 0.9em;
    color: var(--brand-muted);
    font-style: italic;
    margin-top: 0.4em;
    text-align: left;
  }
  .drb-caption {
    font-size: 0.9em;
    color: var(--brand-muted);
    font-style: italic;
    text-align: center;
    margin: 0.4em 0;
  }
  .drb-page-break { page-break-after: always; }
  table {
    border-collapse: collapse;
    margin: 1em 0;
    width: 100%;
    background: white;
  }
  th, td {
    border: 1px solid #cbd5e1;
    padding: 0.4em 0.7em;
    text-align: left;
  }
  th {
    background: var(--brand-primary);
    color: white;
    font-weight: bold;
  }
  tr:nth-child(even) td { background: #f1f5f9; }
</style>
